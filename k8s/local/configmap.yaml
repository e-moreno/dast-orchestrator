apiVersion: v1
kind: ConfigMap
metadata:
  name: dast-config
  namespace: dast-orchestrator
data:
  # ZAP Configuration
  ZAP_HOST: "localhost"
  ZAP_PORT: "8090"
  ZAP_PROTO: "http"
  ZAP_KEY: "local-dev-zap-key-12345"
  
  # API Configuration
  HMAC_SECRET: "local-dev-hmac-secret-12345"
  
  # Database Configuration - Local MySQL Pod
  DB_RO: |
    {
      "username": "dast_user",
      "password": "PLACEHOLDER",
      "engine": "mysql",
      "host": "dast-mysql-service.dast-orchestrator.svc.cluster.local",
      "port": 3306,
      "dbClusterIdentifier": "dastapi"
    }
  DB_RW: |
    {
      "username": "dast_user",
      "password": "PLACEHOLDER", 
      "engine": "mysql",
      "host": "dast-mysql-service.dast-orchestrator.svc.cluster.local",
      "port": 3306,
      "dbClusterIdentifier": "dastapi"
    }

