apiVersion: v1
kind: ConfigMap
metadata:
  name: dast-config
  namespace: dast-orchestrator
data:
  # ZAP Configuration
  ZAP_HOST: "localhost"
  ZAP_PORT: "8090"
  ZAP_PROTO: "http"
  ZAP_KEY: "change-me-production-key"
  
  # API Configuration
  HMAC_SECRET: "your-production-hmac-secret"
  
  # Database Configuration (for managed service)
  DB_RO: |
    {
      "username": "dast_user",
      "password": "PLACEHOLDER",
      "engine": "mysql",
      "host": "your-managed-db-host.amazonaws.com",
      "port": 3306,
      "dbClusterIdentifier": "dast-production"
    }
  DB_RW: |
    {
      "username": "dast_user",
      "password": "PLACEHOLDER", 
      "engine": "mysql",
      "host": "your-managed-db-host.amazonaws.com",
      "port": 3306,
      "dbClusterIdentifier": "dast-production"
    }
